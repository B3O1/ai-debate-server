<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI TALK - 토론 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .topic-card.selected { border-color: #3b82f6; background-color: #eff6ff; box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen relative">

    <div id="lobby-screen" class="max-w-[1000px] mx-auto py-12 px-4">
        <div class="bg-white rounded-2xl shadow-lg p-8 border border-slate-200">
            <h1 class="text-2xl font-black text-center text-slate-800 mb-8 flex items-center justify-center gap-2">
                <span class="text-blue-600">💬 AI TALK</span> 토론 주제를 선택하세요
            </h1>

            <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-4 mb-8" id="topic-grid"></div>

            <hr class="border-slate-200 mb-6">

            <div id="quick-settings" class="transition-all duration-300">
                <h3 class="text-sm font-bold text-slate-500 mb-3">일반 토론 빠른 설정</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                    <select id="model-type" class="p-3 rounded-lg border border-slate-300 font-medium text-slate-700">
                        <option value="groq" selected>⚡ 그록 (빠름, 10만 한도)</option>
                        <option value="gemini">💎 제미나이 (균형, 1500회)</option>
                        <option value="cohere">🕊️ 코히어 (친화력, 1000회)</option>
                    </select>

                    <select id="personality" class="p-3 rounded-lg border border-slate-300 font-medium text-slate-700">
                        <option value="cynical" selected>😤 까칠한 팩트폭격기</option>
                        <option value="kind">🌷 다정한 멘토</option>
                        <option value="cold">🧊 냉정한 채점관</option>
                    </select>

                    <select id="attitude" class="p-3 rounded-lg border border-slate-300 font-medium text-slate-700">
                        <option value="egoist" selected>🤑 철저한 이기주의자</option>
                        <option value="pragmatist">🏢 극단적 현실주의자</option>
                        <option value="idealist">🕊️ 도덕적 이상주의자</option>
                        <option value="data_freak">🔎 데이터 맹신론자</option>
                        <option value="radical">💥 극단적 혁명가</option>
                        <option value="innovator">🚀 무한 긍정 혁신가</option>
                        <option value="traditionalist">🛡️ 굳건한 전통수호자</option>
                    </select>

                    <select id="meeting-atmosphere" class="p-3 rounded-lg border border-slate-300 font-bold text-indigo-700 bg-indigo-50">
                        <option value="adversarial" selected>⚔️ 적대적 토론 (대립)</option>
                        <option value="cooperative">🤝 협력적 회의 (일치)</option>
                        <option disabled>───────────────</option>
                        <option value="efficiency">📈 효율성 추구 (공동 목표)</option>
                        <option value="limited">🍕 한정적 자원 쟁탈전 (제로섬)</option>
                        <option value="negotiation">💼 비즈니스 이익 협상 (밀당)</option>
                        <option value="judge">🧐 깐깐한 심사위원 (평가/면접)</option>
                        <option value="professor">🎓 깐깐한 교수님 (과제/논문)</option>
                        <option value="ceo_client">🏢 '갑' 사장님 (계약 체결)</option>
                        <option value="competitor">🦹 라이벌 경쟁자 (경쟁 PT)</option>
                        <option value="thesis_attacker">📝 논문/기획 공격수</option>
                        <option value="bored_friend">🍿 심심한 현실 찐친</option>
                    </select>
                </div>
                <div class="text-center">
                    <button onclick="enterDebateRoom(false)" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-12 rounded-lg shadow-md text-lg">
                        일반 토론 시작
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="custom-modal" class="hidden fixed inset-0 bg-slate-900 bg-opacity-60 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto custom-scroll">
            <div class="p-6 border-b border-slate-200 flex justify-between items-center sticky top-0 bg-white z-10">
                <h2 class="text-xl font-black text-slate-800">🛠️ 커스텀 시나리오 방 생성</h2>
                <button onclick="closeCustomModal()" class="text-slate-400 hover:text-red-500 font-bold text-xl">&times;</button>
            </div>

            <div class="p-6 space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1">방 이름 (저장용)</label>
                        <input type="text" id="c-room-name" placeholder="예: 25년 하반기 연봉협상 연습" class="w-full p-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 bg-slate-50">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1">핵심 주제</label>
                        <input type="text" id="c-topic" placeholder="예: 연봉 10% 인상 요구" class="w-full p-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">배경 상황</label>
                    <textarea id="c-bg" rows="2" placeholder="예: 나는 작년에 팀 내 실적 1위였으나, 회사는 경영 악화를 핑계로 동결을 주장함." class="w-full p-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 text-sm"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">달성 목표</label>
                    <textarea id="c-goal" rows="2" placeholder="예: 최소 5% 이상의 인상률을 방어하고, 추가 복지 혜택을 얻어낸다." class="w-full p-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 text-sm"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">조건 (AI가 지켜야 할 규칙)</label>
                    <textarea id="c-rule" rows="2" placeholder="예: 퇴사하라는 극단적인 말은 하지 말 것. 회사의 예산 부족 데이터를 구체적으로 제시할 것." class="w-full p-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 text-sm"></textarea>
                </div>
                <hr class="border-slate-200">
                <h3 class="text-sm font-bold text-slate-700">AI 모델 / 말투 / 가치관 / 상황 설정</h3>
                <div class="grid grid-cols-2 lg:grid-cols-4 gap-3">
                    <select id="c-model" class="p-2 rounded-lg border border-slate-300 text-sm font-medium">
                        <option value="groq">⚡ 그록</option>
                        <option value="gemini">💎 제미나이</option>
                        <option value="cohere">🕊️ 코히어</option>
                    </select>
                    <select id="c-personality" class="p-2 rounded-lg border border-slate-300 text-sm font-medium">
                        <option value="cynical">😤 까칠한</option>
                        <option value="kind">🌷 다정한</option>
                        <option value="cold">🧊 냉정한</option>
                    </select>
                    <select id="c-attitude" class="p-2 rounded-lg border border-slate-300 text-sm font-medium">
                        <option value="egoist">🤑 이기주의자</option>
                        <option value="pragmatist">🏢 현실주의자</option>
                        <option value="idealist">🕊️ 이상주의자</option>
                        <option value="data_freak">🔎 데이터광</option>
                        <option value="radical">💥 혁명가</option>
                        <option value="innovator">🚀 혁신가</option>
                        <option value="traditionalist">🛡️ 전통수호자</option>
                    </select>
                    <select id="c-atmos" class="p-2 rounded-lg border border-slate-300 text-sm font-medium">
                        <option value="adversarial">⚔️ 적대적 대립</option>
                        <option value="cooperative">🤝 협력적 회의</option>
                        <option value="efficiency">📈 효율성 브레인스토밍</option>
                        <option value="limited">🍕 제로섬 자원쟁탈</option>
                        <option value="negotiation">💼 비즈니스 협상</option>
                        <option value="judge">🧐 깐깐한 심사위원</option>
                        <option value="professor">🎓 과제검사 교수님</option>
                        <option value="ceo_client">🏢 계약결정 사장님</option>
                        <option value="competitor">🦹 라이벌 경쟁자</option>
                        <option value="thesis_attacker">📝 논문/기획 공격수</option>
                        <option value="bored_friend">🍿 딴지거는 찐친</option>
                    </select>
                </div>
            </div>

            <div class="p-6 border-t border-slate-200 bg-slate-50 rounded-b-2xl flex justify-end gap-3">
                <button onclick="closeCustomModal()" class="px-5 py-2.5 rounded-lg font-bold text-slate-600 hover:bg-slate-200">취소</button>
                <button onclick="enterDebateRoom(true)" class="px-6 py-2.5 bg-purple-600 hover:bg-purple-700 text-white rounded-lg font-bold shadow-md">커스텀 시나리오 시작 🚀</button>
            </div>
        </div>
    </div>

    <div id="debate-screen" class="hidden max-w-[1600px] mx-auto px-4 py-8">
        <header class="flex justify-between items-center mb-6 bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
            <h1 class="text-2xl font-bold text-slate-800 tracking-tight">💬 AI TALK</h1>
            <div class="text-center flex-1">
                <p class="text-xs text-slate-400 font-bold" id="room-name-display">일반 방</p>
                <p class="text-sm text-slate-800 font-bold">주제 : "<span id="current-topic-display"></span>"</p>
            </div>
            <button onclick="leaveDebateRoom()" class="bg-slate-100 text-slate-600 px-4 py-2 rounded-lg font-bold hover:bg-slate-200">방 나가기</button>
        </header>

        <div class="grid grid-cols-12 gap-6 transition-all duration-300">
            <div id="left-panel" class="col-span-12 lg:col-span-3 transition-all duration-300">
                <div class="bg-white rounded-2xl shadow-sm p-5 border border-red-100 h-[600px] flex flex-col">
                    <h3 class="font-bold text-red-600 mb-4 flex items-center justify-between">
                        <span>🤖 AI 반박 요약</span>
                        <span id="ai-count" class="bg-red-100 text-red-800 text-xs px-2 py-1 rounded">0</span>
                    </h3>
                    <div id="ai-history-list" class="custom-scroll space-y-3 overflow-y-auto flex-1 text-xs">
                        <p class="text-center text-slate-400 py-10" id="ai-empty">기록 없음</p>
                    </div>
                </div>
            </div>

            <div id="center-panel" class="col-span-12 lg:col-span-6 transition-all duration-300">
                <div class="bg-white rounded-2xl shadow-md p-6 border border-slate-200 h-[600px] flex flex-col">
                    <div class="mb-4 flex gap-2 justify-between items-center">
                        <button onclick="togglePanels()" class="px-3 py-1 bg-slate-100 text-slate-600 text-sm rounded font-bold hover:bg-slate-200 flex items-center gap-1">
                            <span id="toggle-icon">👁️</span> 요약 패널 토글
                        </button>
                        <button onclick="finishDebate()" class="px-5 py-2 bg-blue-600 text-white rounded font-bold hover:bg-blue-700 shadow-sm transition-colors">토론 종료 및 종합 분석</button>
                    </div>

                    <div class="mb-4 bg-slate-100 rounded-full h-5 overflow-hidden border border-slate-200 relative shadow-inner">
                        <div id="token-bar" class="bg-emerald-400 h-full transition-all duration-700" style="width: 0%"></div>
                        <span id="token-text" class="absolute inset-0 flex items-center justify-center text-xs font-bold text-slate-700 drop-shadow-sm">0 / 100,000 토큰</span>
                    </div>

                    <div id="chat-box" class="flex-1 space-y-4 overflow-y-auto custom-scroll mb-4 pr-2">
                        </div>

                    <div class="relative mt-auto">
                        <input id="user-input" type="text" placeholder="주장을 입력하세요..."
                               class="w-full p-4 pr-20 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500"
                               onkeypress="if(event.keyCode==13) sendClaim()">
                        <button onclick="sendClaim()" class="absolute right-2 top-2 bottom-2 bg-slate-600 hover:bg-slate-700 text-white px-6 rounded-lg font-bold">전송</button>
                    </div>
                </div>
            </div>

            <div id="right-panel" class="col-span-12 lg:col-span-3 transition-all duration-300">
                <div class="bg-white rounded-2xl shadow-sm p-5 border border-blue-100 h-[600px] flex flex-col">
                    <h3 class="font-bold text-blue-600 mb-4 flex items-center justify-between">
                        <span id="user-count" class="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded">0</span>
                        <span>나의 주장 요약 👤</span>
                    </h3>
                    <div id="user-history-list" class="custom-scroll space-y-3 overflow-y-auto flex-1 text-xs text-right">
                        <p class="text-center text-slate-400 py-10" id="user-empty">기록 없음</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="result-screen" class="hidden max-w-[1000px] mx-auto py-12 px-4">
        <div class="bg-white rounded-2xl shadow-lg p-8 border border-slate-200">
            <h1 class="text-2xl font-black text-slate-800 mb-6 border-b pb-4">📊 결과 대시보드</h1>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                <div class="flex flex-col items-center justify-center border border-slate-200 rounded-xl p-6 bg-slate-50">
                    <p class="text-slate-600 font-bold mb-2">종합 점수 (Overall Score)</p>
                    <div class="relative flex items-center justify-center w-48 h-48 rounded-full border-8 border-slate-200">
                        <div class="text-center">
                            <span id="final-score" class="text-6xl font-black text-blue-600">0</span>
                            <span class="text-xl text-slate-400 font-bold">/100</span>
                        </div>
                    </div>
                </div>

                <div class="flex flex-col justify-center space-y-6">
                    <div>
                        <h3 class="font-bold text-slate-800 mb-2 border-b pb-1">핵심 분석 요약</h3>
                        <div class="mb-4">
                            <p class="font-bold text-slate-700 mb-1">장점: <span class="bg-slate-600 text-white text-xs px-2 py-1 rounded">논리 점수 <span id="logic-score">0</span>점</span></p>
                            <ul id="strength-list" class="list-disc list-inside text-sm text-slate-600 space-y-1"></ul>
                        </div>
                        <div>
                            <p class="font-bold text-slate-700 mb-1">단점: <span class="bg-yellow-500 text-white text-xs px-2 py-1 rounded">설득력 점수 <span id="persuasion-score">0</span>점</span></p>
                            <ul id="weakness-list" class="list-disc list-inside text-sm text-slate-600 space-y-1"></ul>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mb-8 border border-slate-200 rounded-xl p-6 bg-blue-50">
                <h3 class="font-bold text-blue-800 mb-2">상세 피드백</h3>
                <p id="final-feedback" class="text-sm text-slate-700 leading-relaxed"></p>
            </div>

            <div class="flex justify-center gap-4">
                <button onclick="location.reload()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg shadow-md">새 토론 시작</button>
                <button onclick="saveResultAsText()" class="bg-slate-600 hover:bg-slate-700 text-white font-bold py-3 px-8 rounded-lg shadow-md flex items-center gap-2">
                    💾 결과 저장 (.txt)
                </button>
            </div>
        </div>
    </div>

<script>const API_BASE_URL = "https://donghwan-debate-api-hsh8a0bbekbng6hr.koreacentral-01.azurewebsites.net"; // 💡 동환 님의 애저 서버 주소!
        let currentSessionId = "room_" + Date.now(); // 💡 DB 충돌 방지용 고유 방 번호 생성

        const topics = [
            { id: 1, category: "연애", color: "orange", title: "깻잎 논쟁, 이해할 수 있는가?" },
            { id: 2, category: "경제", color: "blue", title: "기본소득 도입에 찬성하는가?" },
            { id: 3, category: "사회", color: "indigo", title: "중고교 내 스마트폰 사용 금지, 찬성하는가?" },
            { id: 4, category: "법률", color: "red", title: "사형제도, 유지해야 하는가?" },
            { id: 5, category: "교육", color: "sky", title: "대학에서 출석체크가 필요한가?" },
            { id: 6, category: "환경", color: "green", title: "기후 변화 해결을 위해 원자력을 확대해야 하는가?" },
            { id: 7, category: "정치", color: "orange", title: "국회의원 특권 축소, 꼭 필요한가?" },
            { id: 8, category: "과학", color: "blue", title: "인간의 화성 탐사, 실현 가능한가?" },
            { id: 9, category: "AI", color: "purple", title: "인공지능 예술작품의 저작권을 인정해야 하는가?" },
            { id: 'custom', category: "직접입력", color: "slate", title: "+ 시나리오 방 만들기", isCustom: true }
        ];

        let selectedTopicId = null;
        let activeTopicText = "";
        let roomName = "";
        let customScenarioData = null;
        let panelsHidden = false;
        let finalReportData = null;

        document.getElementById('topic-grid').innerHTML = topics.map(t => {
            const colorClass = `text-${t.color}-600 bg-${t.color}-100`;
            return `
            <div onclick="selectTopic('${t.id}')" id="card-${t.id}" class="topic-card border border-slate-200 rounded-xl p-4 cursor-pointer hover:shadow-md transition-all bg-white flex flex-col items-center justify-center text-center h-32">
                ${t.isCustom ?
                    `<span class="text-purple-600 font-black">${t.title}</span>` :
                    `<span class="text-xs font-black px-2 py-1 rounded mb-2 ${colorClass}">[${t.category}]</span>
                     <p class="font-bold text-slate-700 text-sm leading-tight">${t.title}</p>`
                }
            </div>`
        }).join('');

        function selectTopic(id) {
            selectedTopicId = id;
            document.querySelectorAll('.topic-card').forEach(c => c.classList.remove('selected'));
            document.getElementById(`card-${id}`).classList.add('selected');

            if (id === 'custom') {
                document.getElementById('custom-modal').classList.remove('hidden');
            } else {
                activeTopicText = topics.find(t => t.id == id).title;
                roomName = "일반 토론장";
            }
        }

        function closeCustomModal() {
            document.getElementById('custom-modal').classList.add('hidden');
            document.querySelectorAll('.topic-card').forEach(c => c.classList.remove('selected'));
            selectedTopicId = null;
        }

        async function enterDebateRoom(isCustom = false) {
            // 방에 입장할 때마다 새로운 고유 ID 부여
            currentSessionId = "room_" + Date.now();

            if (isCustom) {
                roomName = document.getElementById('c-room-name').value || "커스텀 방";
                activeTopicText = document.getElementById('c-topic').value;
                if (!activeTopicText) return alert("주제를 입력해주세요!");

                customScenarioData = {
                    topic: activeTopicText,
                    background: document.getElementById('c-bg').value,
                    goal: document.getElementById('c-goal').value,
                    condition: document.getElementById('c-rule').value,
                    model_type: document.getElementById('c-model').value,
                    personality: document.getElementById('c-personality').value,
                    attitude: document.getElementById('c-attitude').value,
                    atmosphere: document.getElementById('c-atmos').value
                };
                closeCustomModal();
            } else {
                if (!selectedTopicId) return alert("토론 주제를 선택해주세요!");
                customScenarioData = {
                    topic: activeTopicText,
                    model_type: document.getElementById('model-type').value,
                    personality: document.getElementById('personality').value,
                    attitude: document.getElementById('attitude').value,
                    atmosphere: document.getElementById('meeting-atmosphere').value
                };
            }

            // 💡 리셋 API 호출 (애저 주소 및 session_id 적용)
            try {
                await fetch(`${API_BASE_URL}/api/v1/debate/reset`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: currentSessionId })
                });
            } catch (e) { console.error("리셋 실패:", e); }

            const chatBox = document.getElementById('chat-box');
            if (chatBox) {
                chatBox.innerHTML = `<div class="text-center text-slate-400 mt-20" id="start-msg">주제에 대한 첫 주장을 입력하여 토론의 포문을 여세요!</div>`;
            }

            const uList = document.getElementById('user-history-list');
            if(uList) uList.innerHTML = `<p class="text-center text-slate-400 py-10" id="user-empty">기록 없음</p>`;

            const aList = document.getElementById('ai-history-list');
            if(aList) aList.innerHTML = `<p class="text-center text-slate-400 py-10" id="ai-empty">기록 없음</p>`;

            const uCount = document.getElementById('user-count');
            if(uCount) uCount.innerText = "0";

            const aCount = document.getElementById('ai-count');
            if(aCount) aCount.innerText = "0";

            document.getElementById('lobby-screen').classList.add('hidden');
            document.getElementById('debate-screen').classList.remove('hidden');

            document.getElementById('room-name-display').innerText = `[${roomName}]`;
            document.getElementById('current-topic-display').innerText = activeTopicText;
        }

        function togglePanels() {
            const left = document.getElementById('left-panel');
            const right = document.getElementById('right-panel');
            const center = document.getElementById('center-panel');
            const icon = document.getElementById('toggle-icon');

            panelsHidden = !panelsHidden;
            if (panelsHidden) {
                left.classList.add('hidden');
                right.classList.add('hidden');
                center.classList.remove('lg:col-span-6');
                center.classList.add('lg:col-span-12');
                icon.innerText = "👀";
            } else {
                left.classList.remove('hidden');
                right.classList.remove('hidden');
                center.classList.remove('lg:col-span-12');
                center.classList.add('lg:col-span-6');
                icon.innerText = "👁️";
            }
        }

        function leaveDebateRoom() {
            if(confirm("방을 나가면 현재 토론 기록이 사라집니다. 나가시겠습니까?")) {
                location.reload();
            }
        }

        async function sendClaim() {
            const userInput = document.getElementById('user-input');
            const text = userInput.value.trim();
            if (!text) return;

            const startMsg = document.getElementById('start-msg');
            if (startMsg) {
                startMsg.remove();
            }

            appendMessage('user', text);
            userInput.value = '';

            const loadingId = 'load-' + Date.now();
            appendMessage('ai', '논리 분석 중...', loadingId);

            try {
                // 💡 페이로드에 session_id 필수 추가!
                const payload = {
                    message: text,
                    session_id: currentSessionId,
                    model_type: customScenarioData ? customScenarioData.model_type : 'groq',
                    personality: customScenarioData ? customScenarioData.personality : 'cynical',
                    attitude: customScenarioData ? customScenarioData.attitude : 'egoist',
                    atmosphere: customScenarioData ? customScenarioData.atmosphere : 'adversarial',
                    topic: customScenarioData ? customScenarioData.topic : '',
                    background: (customScenarioData && customScenarioData.background) ? customScenarioData.background : null,
                    goal: (customScenarioData && customScenarioData.goal) ? customScenarioData.goal : null,
                    condition: (customScenarioData && customScenarioData.condition) ? customScenarioData.condition : null
                };

                // 💡 채팅 API 호출 (애저 주소 적용)
                const response = await fetch(`${API_BASE_URL}/api/v1/debate/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();

                const loadingEl = document.getElementById(loadingId);
                if (loadingEl) {
                    loadingEl.remove();
                }

                appendMessage('ai', result.ai_rebuttal, null, result.evaluation);
                updateHistoryBoards(result.user_history, result.ai_history);

                if(result.total_tokens && customScenarioData && customScenarioData.model_type === 'groq') {
                    let percentage = (result.total_tokens / 100000) * 100;
                    const tokenBar = document.getElementById('token-bar');
                    const tokenText = document.getElementById('token-text');

                    if (tokenBar) {
                        tokenBar.style.width = Math.min(percentage, 100) + '%';
                        tokenBar.className = percentage > 80 ? "bg-red-500 h-full transition-all duration-700" : "bg-emerald-400 h-full transition-all duration-700";
                    }
                    if (tokenText) {
                        tokenText.innerText = `${result.total_tokens.toLocaleString()} / 100,000 토큰`;
                    }
                }
            } catch (err) {
                console.error("통신 에러 발생:", err);
                const loadingEl = document.getElementById(loadingId);
                if (loadingEl) {
                    loadingEl.remove();
                }
                appendMessage('ai', '⚠️ 통신 오류 발생: 서버가 켜져 있는지 확인하세요.');
            }
        }

        async function finishDebate() {
            if(!confirm("토론을 종료하고 종합 분석 대시보드로 이동하시겠습니까?")) return;

            const loadingId = 'load-eval-' + Date.now();
            appendMessage('ai', '⚖️ 코히어 심판이 전체 대화를 분석 중입니다...', loadingId);

            try {
                // 💡 평가 API 호출 (애저 주소 및 session_id 적용)
                const response = await fetch(`${API_BASE_URL}/api/v1/debate/evaluate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: currentSessionId })
                });
                const result = await response.json();

                finalReportData = result;

                document.getElementById('debate-screen').classList.add('hidden');
                document.getElementById('result-screen').classList.remove('hidden');

                document.getElementById('final-score').innerText = result.score ?? '-';
                document.getElementById('logic-score').innerText = result.logic_score ?? '-';
                document.getElementById('persuasion-score').innerText = result.persuasion_score ?? '-';

                const strengths = Array.isArray(result.strengths) ? result.strengths : (result.strengths ? [result.strengths] : ['데이터 없음']);
                const weaknesses = Array.isArray(result.weaknesses) ? result.weaknesses : (result.weaknesses ? [result.weaknesses] : ['데이터 없음']);

                document.getElementById('strength-list').innerHTML = strengths.map(s => `<li>${s}</li>`).join('');
                document.getElementById('weakness-list').innerHTML = weaknesses.map(w => `<li>${w}</li>`).join('');
                document.getElementById('final-feedback').innerText = result.feedback ?? '피드백 없음';

            } catch (err) {
                const loadingEl = document.getElementById(loadingId);
                if (loadingEl) loadingEl.remove();
                alert("평가 중 서버 오류가 발생했습니다.");
            }
        }

        function saveResultAsText() {
            if(!finalReportData) return;
            const topic = activeTopicText;
            const date = new Date().toLocaleString();

            const content = `=========================================
[AI TALK] 토론 결과 보고서
=========================================
주제: ${topic}
일시: ${date}

[최종 성적]
총점: ${finalReportData.score} / 100 점
논리 점수: ${finalReportData.logic_score} 점
설득력 점수: ${finalReportData.persuasion_score} 점

[장점]
${finalReportData.strengths.map(s => "- " + s).join('\n')}

[단점]
${finalReportData.weaknesses.map(w => "- " + w).join('\n')}

[상세 피드백]
${finalReportData.feedback}

=========================================
[전체 대화 기록]
=========================================
${finalReportData.raw_chat}`;

            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `AI_TALK_결과_${new Date().getTime()}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function appendMessage(role, text, id = null, evalData = null) {
            const chatBox = document.getElementById('chat-box');
            if (!chatBox) return;

            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            if(id) div.id = id;

            if (role === 'user') {
                div.innerHTML = `<div class="bg-blue-600 text-white px-4 py-2 rounded-2xl rounded-tr-none max-w-[85%]">${text}</div>`;
            } else {
                div.innerHTML = `
                    <div class="bg-slate-100 text-slate-700 p-4 rounded-2xl rounded-tl-none max-w-[90%] w-full shadow-sm text-sm">
                        ${evalData ? `<div class="text-xs font-bold text-slate-400 mb-2 border-b pb-1">논리 분석 중... (논리성 ${evalData.logic_score} | 설득력 ${evalData.persuasion_score})</div>` : ''}
                        <div class="leading-relaxed whitespace-pre-wrap">${text}</div>
                    </div>`;
            }
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function updateHistoryBoards(uHistory, aHistory) {
            if(!uHistory || !aHistory) return;

            const uEmpty = document.getElementById('user-empty');
            if (uEmpty) uEmpty.remove();

            const aEmpty = document.getElementById('ai-empty');
            if (aEmpty) aEmpty.remove();

            const userList = document.getElementById('user-history-list');
            if (userList) {
                userList.innerHTML = uHistory.map(item => `
                    <div class="bg-blue-50 text-blue-800 p-3 rounded-xl border border-blue-100">${item}</div>
                `).reverse().join('');
            }

            const aiList = document.getElementById('ai-history-list');
            if (aiList) {
                aiList.innerHTML = aHistory.map(item => `
                    <div class="bg-red-50 text-red-800 p-3 rounded-xl border border-red-100">${item}</div>
                `).reverse().join('');
            }

            const uCount = document.getElementById('user-count');
            if (uCount) uCount.innerText = uHistory.length;

            const aCount = document.getElementById('ai-count');
            if (aCount) aCount.innerText = aHistory.length;
        }</script>
</body>
